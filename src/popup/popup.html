<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
    <link rel="stylesheet" href="custom.css"/>
  </head>

<body>
  <div class="container-fluid">
    <h3 class="text-success text-center m-3">Sort Bookmarks</h3>
    <h4>Keywords</h4>
    <div id="asker">
      <p>Please separate all keywords by commas.</p>
      <textarea id="userIn"></textarea>
      <button class="btn btn-sm btn-outline-success mb-4" id="randomized">Sort</button>
    </div>
    <div id="result" class="pb-4">
      <p id="teller">Sorting bookmarks based on the following keywords.</p>
    </div>

  </div>


  <script src="custom.js"></script>
</body>

</html>
