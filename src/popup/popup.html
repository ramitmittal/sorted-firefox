<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="bootstrap.min.css"/>
  </head>

<body>
  <div class="container-fluid">

    <h3 class="text-success text-center mt-2">Sorted</h3>

    <hr>
    <div id="asker">
      <p>Please enter the words that frequently appear<br>in the titles of your bookmarks.<br> Separate all keywords by commas.</p>
      <textarea id="userIn"></textarea>

      <button class="btn btn-sm btn-outline-success mb-4" id="randomized">Sort</button>
    </div>

    <div id="result" class="pb-4 d-none">
      <p id="teller">Sorting bookmarks based on the following keywords.</p>
    </div>

    <hr>
    <div>
      <p><a href="http://ramitmittal.github.io/sorted" class="text-dark">Help</a> | <a href="http://github.io/ramitmittal/sorted" class="text-dark">Github</a> | v2.1</p>
    </div>

  </div>

  <script src="main.js"></script>
</body>

</html>
