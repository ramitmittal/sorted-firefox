<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <title></title>
</head>

<body>
<div style="width:300px;">
    <div class="dropdown-content" id="main-dialog">
        <a class="dropdown-item is-active is-size-5" style="margin-bottom:5px;">
            Sorted
        </a>
        <a class="dropdown-item" id="main-sortlink">
            Organize bookmarks
        </a>
        <a class="dropdown-item" id="main-unsortlink">
            Flatten bookmarks
        </a>
        <hr class="dropdown-divider">
        <a class="dropdown-item" href="https://addons.mozilla.org/en-US/firefox/addon/sorted">
            Learn more
        </a>
    </div>
    <div class="dropdown-content" hidden id="unsort-dialog">
        <div class="dropdown-item">
            <p>This will delete <strong>all sorted folders</strong> moving the bookmarks back to their original
                location.</p>
            <div class="is-flex" style="justify-content:center; margin-top:5px;">
                <a class="button light" id="unsort-accept">Accept</a>
                <span style="min-width:5px;"></span>
                <a class="button is-link" id="unsort-reject">Reject</a>
            </div>
        </div>
    </div>
    <div class="card" hidden id="sort-dialog">
        <div class="dropdown-content">
            <div class="dropdown-item">
                <p>Create <strong>tags</strong> to sort your bookmarks on.</p>
            </div>
        </div>
        <div class="dropdown-content" id="sort-list">
            <a class="dropdown-item" href="#">
                <span class="delete is-small" style="margin-right:10px; top:3px;"></span>
                <input class="input is-small" id="sort-input" placeholder="tech, programming, software" type="text">
            </a>
            <div class="is-flex" href="#" style="margin-top:3px; justify-content: space-between;">
                <a class="button is-small is-light" id="sort-new" style="margin-left:15px !important;">Add</a>
                <a class="button is-small is-link" id="sort-go" style="margin-right:15px;">Sort</a>
            </div>
        </div>
    </div>
</div>
<script src="js/main.js"></script>
</body>

</html>
